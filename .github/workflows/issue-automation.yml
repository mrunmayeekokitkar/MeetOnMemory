name: Open Source Contributor Workflow

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: write

jobs:
  handle_automation:
    runs-on: ubuntu-latest
    steps:
      - name: Process Automation Rules
        uses: actions/github-script@v7
        with:
          script: |
            // ========================================================
            // 1. HANDLE PR MERGE THANK YOU COMMENT (Feature 6)
            // ========================================================
            if (context.eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              if (pr.merged) {
                const prAuthor = pr.user.login;
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `🎉 Thank you for your contribution! Your pull request has been successfully merged. We appreciate your effort in improving MeetOnMemory, @${prAuthor}!`
                });
              }
              return;
            }

            // ========================================================
            // 2. HANDLE ISSUE COMMANDS (Features 2, 3, 4)
            // ========================================================
            if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
              const commentBody = context.payload.comment.body.trim();
              const commenter = context.payload.comment.user.login;
              const issueNumber = context.issue.number;
              const assignees = context.payload.issue.assignees || [];
              const isAssigned = assignees.length > 0;

              // --- SUB-FEATURE: /claim ---
              if (commentBody === '/claim') {
                if (isAssigned) {
                  const currentAssignee = assignees[0].login;
                  const warningMsg = currentAssignee === commenter 
                    ? `⚠️ @${commenter}, you are already assigned to this issue!`
                    : `❌ Request denied. This issue is already claimed by @${currentAssignee}.`;
                  
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: warningMsg
                  });
                  return;
                }

                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  assignees: [commenter]
                });

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `✅ Issue successfully claimed by @${commenter}. Happy coding!`
                });
              }

              // --- SUB-FEATURE: /unclaim ---
              if (commentBody === '/unclaim') {
                if (!isAssigned) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: `⚠️ There is no active claim on this issue to release.`
                  });
                  return;
                }

                const currentAssignee = assignees[0].login;
                const isOwnerOrCollaborator = context.repo.owner === commenter; 

                if (currentAssignee !== commenter && !isOwnerOrCollaborator) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    body: `❌ Only the assigned developer (@${currentAssignee}) or a repository maintainer can unclaim this.`
                  });
                  return;
                }

                await github.rest.issues.removeAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  assignees: [currentAssignee]
                });

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `🔓 @${currentAssignee} has released this issue. It is now available for anyone to claim.`
                });
              }
            }