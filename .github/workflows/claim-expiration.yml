name: Claim Expiration Monitor

on:
  schedule:
    - cron: '0 * * * *'

permissions:
  issues: write

jobs:
  check_claims:
    runs-on: ubuntu-latest
    steps:
      - name: Scan and Expire Stale Claims
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const issuesWithAssignees = openIssues.data.filter(issue => issue.assignees.length > 0 && !issue.pull_request);
            const now = new Date();

            for (const issue of issuesWithAssignees) {
              const timeline = await github.rest.issues.listEventsForTimeline({
                owner,
                repo,
                issue_number: issue.number,
                per_page: 20
              });

              const lastEvent = timeline.data[timeline.data.length - 1];
              if (!lastEvent) continue;

              const lastActivityDate = new Date(lastEvent.created_at || issue.updated_at);
              const hoursInactive = Math.abs(now - lastActivityDate) / 36e5;
              const currentAssignee = issue.assignees[0].login;

              if (hoursInactive >= 48) {
                await github.rest.issues.removeAssignees({
                  owner,
                  repo,
                  issue_number: issue.number,
                  assignees: [currentAssignee]
                });

                await github.rest.issues.createComment({
                  owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `❌ This claim has expired after 48 hours of inactivity. The issue is now available for anyone to claim.`
                });
              } else if (hoursInactive >= 24) {
                const comments = await github.rest.issues.listComments({
                  owner,
                  repo,
                  issue_number: issue.number
                });
                
                const alreadyWarned = comments.data.some(c => c.body.includes("Your claim has been inactive for 24 hours"));

                if (!alreadyWarned) {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: issue.number,
                    body: `⏰ @${currentAssignee}, your claim has been inactive for 24 hours. Please provide an update within the next 24 hours, otherwise your claim will expire.`
                  });
                }
              }
            }